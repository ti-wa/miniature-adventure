# ═══════════════════════════════════════════════════════════════
# Site-Konfiguration – Grundeinstellungen der Website
# ═══════════════════════════════════════════════════════════════
#
# Änderungen hier wirken sich auf die GESAMTE Website aus:
# Browser-Tab-Titel, Fußzeile, E-Mail-Adressen in Kontakt-Links,
# SEO-Beschreibung in Google-Ergebnissen.

# ── Name und Beschreibung ─────────────────────────────────────
title: Mara Steinbach
description: Malerin in Berlin. Abstrakte Landschaften in Öl und Acryl.

# ── Kontakt ───────────────────────────────────────────────────
# Diese E-Mail wird für alle Kontakt-Links verwendet
# (im Menü, in der Fußzeile, auf der Über-mich-Seite).
email: kontakt@marasteinbach.de

# ── Ort für die Fußzeile ──────────────────────────────────────
location: Berlin

# ═══════════════════════════════════════════════════════════════
# Technische Einstellungen – normalerweise nicht anfassen
# ═══════════════════════════════════════════════════════════════

# URL und Pfad – nur ändern, wenn der Repo-Name sich ändert
baseurl: "/miniature-adventure"
url: "https://ti-wa.github.io"

# Blog-Beiträge bekommen URLs wie /blog/titel/
permalink: /blog/:title/

# Automatischer RSS-Feed für Blog-Abonnenten
plugins:
  - jekyll-feed

# Dateien, die nicht mit auf die Website gehören
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
