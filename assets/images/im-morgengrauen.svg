<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8099ae"/>
      <stop offset="55%" stop-color="#aec4d0"/>
      <stop offset="100%" stop-color="#ccd8de"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a8e5a"/>
      <stop offset="100%" stop-color="#364228"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="softer"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Morning horizon glow -->
  <ellipse cx="400" cy="355" rx="550" ry="110" fill="#e8d090" opacity="0.45" filter="url(#softer)"/>
  <ellipse cx="400" cy="370" rx="300" ry="55" fill="#f2e0a0" opacity="0.35" filter="url(#softer)"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="120" rx="160" ry="45" fill="rgba(255,255,255,0.22)" filter="url(#soft)"/>
  <ellipse cx="280" cy="95"  rx="200" ry="38" fill="rgba(255,255,255,0.18)" filter="url(#soft)"/>
  <ellipse cx="620" cy="140" rx="180" ry="42" fill="rgba(255,255,255,0.20)" filter="url(#soft)"/>
  <ellipse cx="760" cy="108" rx="130" ry="35" fill="rgba(255,255,255,0.16)" filter="url(#soft)"/>

  <!-- Horizon mist -->
  <rect y="340" width="800" height="45" fill="#c0d0b8" opacity="0.55" filter="url(#soft)"/>

  <!-- Land -->
  <rect y="365" width="800" height="235" fill="url(#land)"/>

  <!-- Midground bands -->
  <rect y="380" width="800" height="50" fill="#6e8048" opacity="0.70"/>
  <rect y="430" width="800" height="60" fill="#5a6c38" opacity="0.75"/>

  <!-- Vertical elements – reeds / trees -->
  <rect x="68"  y="370" width="3" height="230" fill="#263018" opacity="0.50"/>
  <rect x="80"  y="380" width="2" height="220" fill="#263018" opacity="0.40"/>
  <rect x="92"  y="365" width="4" height="235" fill="#263018" opacity="0.48"/>
  <rect x="108" y="375" width="2" height="225" fill="#263018" opacity="0.35"/>

  <rect x="250" y="372" width="3" height="228" fill="#263018" opacity="0.42"/>
  <rect x="264" y="382" width="2" height="218" fill="#263018" opacity="0.36"/>
  <rect x="278" y="368" width="4" height="232" fill="#263018" opacity="0.46"/>

  <rect x="490" y="375" width="3" height="225" fill="#263018" opacity="0.40"/>
  <rect x="503" y="365" width="5" height="235" fill="#263018" opacity="0.44"/>
  <rect x="520" y="378" width="2" height="222" fill="#263018" opacity="0.34"/>

  <rect x="680" y="370" width="3" height="230" fill="#263018" opacity="0.42"/>
  <rect x="693" y="362" width="2" height="238" fill="#263018" opacity="0.36"/>
  <rect x="706" y="374" width="4" height="226" fill="#263018" opacity="0.46"/>
  <rect x="722" y="380" width="2" height="220" fill="#263018" opacity="0.32"/>

  <!-- Water / foreground dark mass -->
  <rect y="530" width="800" height="70" fill="#263018" opacity="0.65"/>

  <!-- Light reflection on water -->
  <ellipse cx="400" cy="555" rx="200" ry="14" fill="#d8c878" opacity="0.18" filter="url(#soft)"/>

  <!-- Horizon line brushstroke -->
  <rect y="362" width="800" height="5" fill="#b8a860" opacity="0.18"/>
</svg>
