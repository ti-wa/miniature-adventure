# Navigation – das Menü oben auf jeder Seite
# ═══════════════════════════════════════════════════════════════
#
# Jeder Eintrag wird zu einem Menüpunkt.
# Die Reihenfolge hier bestimmt die Reihenfolge im Menü.
#
# Felder:
#   title:     Text, der im Menü erscheint
#   url:       Der Link
#                ▸ interne Seite: beginnt mit "/" (z.B. "/galerie/")
#                ▸ E-Mail:        beginnt mit "mailto:"
#                ▸ externer Link: beginnt mit "https://"
#   highlight: true = der Eintrag wird als Button hervorgehoben (optional)
# ═══════════════════════════════════════════════════════════════

