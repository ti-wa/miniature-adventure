<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="nav-container">
      <a href="{{ '/' | relative_url }}" class="site-name">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/galerie/' | relative_url }}"{% if page.url contains 'galerie' %} class="active"{% endif %}>Galerie</a></li>
        <li><a href="{{ '/blog/' | relative_url }}"{% if page.url contains 'blog' or page.layout == 'post' %} class="active"{% endif %}>Blog</a></li>
        <li><a href="{{ '/ueber-mich/' | relative_url }}"{% if page.url contains 'ueber-mich' %} class="active"{% endif %}>Über mich</a></li>
        <li><a href="mailto:{{ site.email }}" class="nav-contact">Kontakt</a></li>
      </ul>
    </nav>
  </header>

  <main>{{ content }}</main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-name">{{ site.title }}</span>
      <span>{{ site.location }}</span>
      <a href="mailto:{{ site.email }}">{{ site.email }}</a>
      <span class="footer-copy">&copy; {{ site.time | date: "%Y" }}</span>
    </div>
  </footer>
</body>
</html>
