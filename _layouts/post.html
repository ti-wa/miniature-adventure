---
layout: default
---

<div class="container">
  <a href="{{ '/blog/' | relative_url }}" class="back-link">← Blog</a>

  <article>
    <header class="post-header">
      <time>{{ page.date | date: "%d. %B %Y" }}</time>
      <h1>{{ page.title }}</h1>
    </header>

    <div class="post-body">
      {{ content }}
    </div>
  </article>
</div>
